<div class="container-fluid">
  <div class="row">
    <nav
      class="col-12 col-md-3 col-lg-2 bg-body-tertiary border-end vh-md-100 p-3"
    >
      <h5 class="mb-3">
        <a
          routerLink="/intro"
          class="text-decoration-none text-body text-nowrap"
          >Angular Generic Table</a
        >
      </h5>
      @for (section of sections; track section.heading) {
        <h6
          class="text-uppercase text-body-secondary fw-semibold small mt-3 mb-1 px-2"
        >
          {{ section.heading }}
        </h6>
        <ul class="nav nav-pills flex-column mb-2">
          @for (item of section.items; track item.path) {
            <li class="nav-item">
              <a
                class="nav-link"
                [routerLink]="item.path"
                routerLinkActive="active"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      }
    </nav>
    <main class="col-12 col-md-9 col-lg-10 p-3 p-sm-4">
      @if (pageTitle(); as title) {
        <h1 class="mb-4">{{ title }}</h1>
      }
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
