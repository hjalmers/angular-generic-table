name: CI
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build docs
        run: npm run build:docs

      - name: Prepare docs for static hosting
        if: github.ref == 'refs/heads/main'
        run: |
          cp dist/docs/browser/index.html dist/docs/browser/404.html
          touch dist/docs/browser/.nojekyll

      - name: Deploy docs to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/docs/browser
          clean: true
          clean-exclude: |
            legacy
            ivy-rebuild
            merge
            rc

      # npm publishing uses OIDC trusted publishing (no NPM_TOKEN): the
      # @semantic-release/npm plugin exchanges the GitHub Actions OIDC token
      # (id-token: write, above) for a short-lived npm token via the package's
      # configured trusted publisher, and publishes with provenance.
      - name: Run semantic release and publish new version to npm
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run semantic-release

  # Releases @angular-generic-table/mcp (tools/mcp-server) independently of the core
  # library. semantic-release-monorepo only cuts a release when files under
  # tools/mcp-server changed since the last mcp tag, so this job safely runs on every
  # push to main and self-skips otherwise (no workflow-level path filter, which would
  # also skip the core release/docs deploy on mcp-only pushes).
  release-mcp:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: tools/mcp-server
    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release needs full history + tags to determine the next version.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: tools/mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      # First publish only: OIDC trusted publishing can be configured on npm after the
      # package exists, so the initial @angular-generic-table/mcp release needs a one-off
      # manual `npm publish` or a temporary NPM_TOKEN. Subsequent releases use OIDC, like
      # the core library above.
      - name: Run semantic release and publish new version to npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
