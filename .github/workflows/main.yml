name: CI
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build docs
        run: npm run build:docs

      - name: Prepare docs for static hosting
        if: github.ref == 'refs/heads/main'
        run: |
          cp dist/docs/browser/index.html dist/docs/browser/404.html
          touch dist/docs/browser/.nojekyll

      - name: Deploy docs to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/docs/browser
          clean: true
          clean-exclude: |
            legacy
            ivy-rebuild
            merge
            rc

      # npm publishing uses OIDC trusted publishing (no NPM_TOKEN): the
      # @semantic-release/npm plugin exchanges the GitHub Actions OIDC token
      # (id-token: write, above) for a short-lived npm token via the package's
      # configured trusted publisher, and publishes with provenance.
      - name: Run semantic release and publish new version to npm
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run semantic-release
